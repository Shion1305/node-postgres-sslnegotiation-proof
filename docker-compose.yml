# Fully containerized proof that node-postgres `master` supports
# PostgreSQL 17 `sslnegotiation=direct` (PR #3688, merged but unreleased).
#
#   docker compose up --build --abort-on-container-exit --exit-code-from tester
#
# A `certgen` init service mints a throwaway CA + leaf certs for the hostname
# `localhost.shion.dev` into a shared volume. The `tester` connects to Postgres
# by that hostname (it resolves to the postgres container via extra_hosts), so
# node-postgres genuinely sends it as the TLS SNI and verifies the server cert
# against the CA with rejectUnauthorized=true. The tester installs `pg` straight
# from node-postgres master; its exit code is the verdict.

services:
  # Mint CA + server/front certs (CN/SAN = localhost.shion.dev) into /certs, then exit.
  certgen:
    image: alpine:3.20
    volumes:
      - certs:/certs
      - ./certs/gen-certs.sh:/gen-certs.sh:ro
    command: ["sh", "-c", "apk add --no-cache openssl >/dev/null && sh /gen-certs.sh"]

  postgres:
    image: postgres:17
    depends_on:
      certgen:
        condition: service_completed_successfully
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - certs:/certs:ro
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/certs/server.crt
      - -c
      - ssl_key_file=/certs/server.key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
    expose:
      - "5432"
    # Docker DNS resolves localhost.shion.dev -> this container inside the network,
    # so the client can dial the SNI hostname and reach Postgres.
    networks:
      default:
        aliases:
          - localhost.shion.dev

  tester:
    build:
      context: ./tester
      args:
        NODE_POSTGRES_REF: ${NODE_POSTGRES_REF:-master}
    depends_on:
      postgres:
        condition: service_healthy
    # NET_RAW lets tcpdump capture the on-the-wire bytes into the .pcap artifact.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - certs:/certs:ro
      # Writable volume for machine-readable evidence + the full proof log,
      # which CI copies out for the Job Summary and as a downloadable artifact.
      - out:/out
    environment:
      # The hostname the client dials AND sends as SNI; cert is issued for it.
      PGHOST: localhost.shion.dev
      PGPORT: "5432"
      PGUSER: postgres
      PGDATABASE: postgres
      PG_SNI: localhost.shion.dev
      CA_CERT: /certs/ca.crt
      EVIDENCE_PATH: /out/evidence.json
      NODE_POSTGRES_REF: ${NODE_POSTGRES_REF:-master}

volumes:
  certs:
  out:
