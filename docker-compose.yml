# Fully containerized proof that node-postgres `master` supports
# PostgreSQL 17 `sslnegotiation=direct` (PR #3688, merged but unreleased).
#
#   docker compose up --build --exit-code-from tester
#
# `postgres` generates a throwaway CA + leaf certs for `localhost.shion.dev` on
# startup, then runs with ssl=on. The `tester` connects to Postgres by that
# hostname (resolved to the postgres container via a network alias), so
# node-postgres sends it as the TLS SNI and verifies the server cert against the
# CA with rejectUnauthorized=true. The tester installs `pg` straight from
# node-postgres master; its exit code is the verdict.
#
# Only `tester` is expected to exit, so `--exit-code-from tester` (which implies
# --abort-on-container-exit) reports the verdict cleanly. There is deliberately
# no separate init container: a one-shot service that exits would trip
# --abort-on-container-exit and tear everything down before the proofs run.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      # Shared with the tester (which reads the CA to verify the server cert).
      - certs:/certs
      - ./certs/gen-certs.sh:/gen-certs.sh:ro
    # Generate the CA + server/front certs (idempotent) before starting Postgres.
    command:
      - bash
      - -c
      - |
        sh /gen-certs.sh
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/certs/server.crt \
          -c ssl_key_file=/certs/server.key \
          -c log_connections=on
    healthcheck:
      # Healthy only once Postgres is up AND the CA the tester needs exists.
      test: ["CMD-SHELL", "pg_isready -U postgres && test -f /certs/ca.crt"]
      interval: 2s
      timeout: 3s
      retries: 40
    expose:
      - "5432"
    # Docker DNS resolves localhost.shion.dev -> this container inside the network,
    # so the client can dial the SNI hostname and reach Postgres.
    networks:
      default:
        aliases:
          - localhost.shion.dev

  tester:
    build:
      context: ./tester
      args:
        NODE_POSTGRES_REF: ${NODE_POSTGRES_REF:-master}
    depends_on:
      postgres:
        condition: service_healthy
    # NET_RAW lets tcpdump capture the on-the-wire bytes into the .pcap artifact.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - certs:/certs:ro
      # Writable volume for machine-readable evidence + the full proof log,
      # which CI copies out for the Job Summary and as a downloadable artifact.
      - out:/out
    environment:
      # The hostname the client dials AND sends as SNI; cert is issued for it.
      PGHOST: localhost.shion.dev
      PGPORT: "5432"
      PGUSER: postgres
      PGDATABASE: postgres
      PG_SNI: localhost.shion.dev
      CA_CERT: /certs/ca.crt
      EVIDENCE_PATH: /out/evidence.json
      NODE_POSTGRES_REF: ${NODE_POSTGRES_REF:-master}

volumes:
  certs:
  out:
